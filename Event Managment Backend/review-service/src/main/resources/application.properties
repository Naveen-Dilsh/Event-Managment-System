spring.application.name=review-service
server.port=8088

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/event_management_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:RAW@123abc}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Service URLs for OpenFeign
event.service.url=${EVENT_SERVICE_URL:http://localhost:8081}
attendee.service.url=${ATTENDEE_SERVICE_URL:http://localhost:8085}
