services:

  # ─── MySQL Database ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: event-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── event-service (port 8081) ────────────────────────────────
  event-service:
    build: ./event-service
    container_name: event-service
    ports:
      - "8081:8081"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/event_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      VENUE_SERVICE_URL: http://venue-service:8086
    depends_on:
      mysql:
        condition: service_healthy

  # ─── ticketing-service (port 8082) ───────────────────────────
  ticketing-service:
    build: ./ticketing-service
    container_name: ticketing-service
    ports:
      - "8082:8082"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/ticketing_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      EVENT_SERVICE_URL: http://event-service:8081
    depends_on:
      mysql:
        condition: service_healthy

  # ─── booking-service (port 8083) ─────────────────────────────
  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/booking_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
    depends_on:
      mysql:
        condition: service_healthy

  # ─── payment-service (port 8084) ─────────────────────────────
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/payment_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
    depends_on:
      mysql:
        condition: service_healthy

  # ─── attendee-service (port 8085) ────────────────────────────
  attendee-service:
    build: ./attendee-service
    container_name: attendee-service
    ports:
      - "8085:8085"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/attendee_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
    depends_on:
      mysql:
        condition: service_healthy

  # ─── venue-service (port 8086) ───────────────────────────────
  venue-service:
    build: ./venue-service
    container_name: venue-service
    ports:
      - "8086:8086"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/venue_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
    depends_on:
      mysql:
        condition: service_healthy

  # ─── notification-service (port 8087) ────────────────────────
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/event_management_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      BOOKING_SERVICE_URL: http://booking-service:8083
      EVENT_SERVICE_URL: http://event-service:8081
      MAIL_USERNAME: your_email@gmail.com
      MAIL_PASSWORD: your_app_password
    depends_on:
      mysql:
        condition: service_healthy

  # ─── review-service (port 8088) ──────────────────────────────
  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "8088:8088"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/event_management_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      EVENT_SERVICE_URL: http://event-service:8081
      ATTENDEE_SERVICE_URL: http://attendee-service:8085
    depends_on:
      mysql:
        condition: service_healthy

  # ─── vendor-service (port 8089) ──────────────────────────────
  vendor-service:
    build: ./vendor-service
    container_name: vendor-service
    ports:
      - "8089:8089"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/vendor_db
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      EVENT_SERVICE_URL: http://event-service:8081
    depends_on:
      mysql:
        condition: service_healthy

  # ─── analytics-service (port 8090) ───────────────────────────
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8090:8090"
    environment:
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DB_URL: jdbc:mysql://mysql:3306/event_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: admin
      DB_PASSWORD: adminpassword
      EVENT_SERVICE_URL: http://event-service:8081
      TICKETING_SERVICE_URL: http://ticketing-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      ATTENDEE_SERVICE_URL: http://attendee-service:8085
      REVIEW_SERVICE_URL: http://review-service:8088
      VENDOR_SERVICE_URL: http://vendor-service:8089
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
