spring.application.name=event-service
server.port=8081

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/event_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Naveen@123}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Service URLs for OpenFeign
venue.service.url=${VENUE_SERVICE_URL:http://localhost:8086}
announcer.service.url=${ANNOUNCER_SERVICE_URL:http://localhost:8082}